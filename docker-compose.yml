version: "3.8"

services:
  backend:
    build: ./backend
    container_name: dtu-backend
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=${SECRET_KEY:-doi-truoc-khi-deploy-that}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - FACEBOOK_PAGE_ACCESS_TOKEN=${FACEBOOK_PAGE_ACCESS_TOKEN:-}
      - FACEBOOK_PAGE_ID=${FACEBOOK_PAGE_ID:-}
      - CORS_ALLOWED_ORIGINS=*
    volumes:
      - dtu-data:/app/data
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    container_name: dtu-frontend
    ports:
      - "8080:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  dtu-data:
