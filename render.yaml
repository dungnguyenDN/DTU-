# Render.com Blueprint — deploy backend tự động chỉ với 1 cú click.
# Cách dùng: đẩy repo lên GitHub -> Render Dashboard -> New -> Blueprint -> chọn repo.
#
# Lưu ý gói FREE: không hỗ trợ ổ đĩa bền vững (disk). Không sao — startCommand chạy
# seed_data.py mỗi lần khởi động nên dữ liệu mẫu luôn được tạo lại đầy đủ. SQLite ghi
# vào /tmp (ghi được trên máy chủ). Dữ liệu phát sinh trong phiên (lead mới, bài mới...)
# sẽ reset khi server ngủ/khởi động lại — chấp nhận được cho demo. Cần lưu vĩnh viễn thì
# nâng gói có disk hoặc chuyển sang Postgres.
services:
  - type: web
    name: dtu-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Nạp dữ liệu mẫu rồi chạy gunicorn (WSGI production). 1 worker để tránh khoá ghi SQLite.
    startCommand: python seed_data.py && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: SECRET_KEY          # Render tự sinh chuỗi ngẫu nhiên an toàn
        generateValue: true
      - key: DATABASE_PATH       # thư mục tạm ghi được (gói free không có disk bền vững)
        value: /tmp/dtu_platform.db
      - key: CORS_ALLOWED_ORIGINS
        value: "*"               # có thể siết lại thành URL frontend sau khi deploy
      - key: ANTHROPIC_API_KEY   # để trống vẫn chạy (chế độ AI offline); điền để dùng Claude thật
        sync: false
