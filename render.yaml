# Render.com Blueprint — deploy backend + PostgreSQL bền vững, tự động.
# Cách dùng: đẩy repo lên GitHub -> Render Dashboard -> New -> Blueprint -> chọn repo.
# Render đọc file này, tạo web service + 1 database PostgreSQL, tự nối DATABASE_URL.
#
# Vì sao Postgres: dữ liệu (tài khoản mới, đổi vai trò, bài đã duyệt, lead...) được LƯU
# BỀN VỮNG, không bị reset khi server ngủ/khởi động lại như SQLite trên /tmp trước đây.
databases:
  - name: dtu-db
    plan: free

services:
  - type: web
    name: dtu-backend
    runtime: python
    plan: free
    autoDeploy: true          # tự động deploy lại mỗi khi push lên nhánh main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Seed CHỈ khi CSDL trống (lần đầu) rồi chạy gunicorn — các lần restart sau giữ nguyên dữ liệu.
    startCommand: python seed_data.py --if-empty && gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: SECRET_KEY          # Render tự sinh chuỗi ngẫu nhiên an toàn
        generateValue: true
      - key: DATABASE_URL        # tự nối tới database Postgres bên dưới
        fromDatabase:
          name: dtu-db
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        value: "*"               # có thể siết lại thành URL frontend sau khi deploy
      - key: ANTHROPIC_API_KEY   # để trống vẫn chạy (chế độ AI offline); điền để dùng Claude thật
        sync: false
